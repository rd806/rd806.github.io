<script>
    var toggleButton = document.getElementById('toggle-toc');
    var tocContainer = document.getElementById('toc-container');

    
    toggleButton.addEventListener('click', function() {
        if (tocContainer.style.display === 'none' || tocContainer.style.display === '') {
            tocContainer.style.display = 'block';
        } else {
            tocContainer.style.display = 'none';
        }
    });

    
    toggleButton.addEventListener('mouseover', function() {
        
            tocContainer.style.display = 'block';
        
    });

    
    document.addEventListener('click', function(event) {
        
            
            if (!tocContainer.contains(event.target) && event.target !== toggleButton) {
                
                tocContainer.style.display = 'none';
            }
        
    });
</script>

            <div class="AnswerBox"><p>Answer</p></div>
            <div class="AnswerToggle">
                <button id="ShowAnswer">显示解答</button>
                <button id="HideAnswer">隐藏解答</button>

            delimiters: [
                {left: '$$', right: '$$', display: true},

    <script>
        let exercises = [];
        let num = 0;    

        
        async function loadQuestion() {
            const res = await fetch('/json/exercises.json');    
            exercises = await res.json();
            RandomQuestion();
        }

        
        function showQuestion() {
            const exercise = exercises[num];
            
            const textElement = document.querySelector(".QuestionBox");
            const authorElement = document.querySelector(".AnswerBox");

            textElement.innerHTML = exercise.question;
            authorElement.innerHTML = exercise.answer;

            hideAnswer();
        }

        
        function showPreQuestion() {
            num --;
            if(num < 0 ) {
                num = exercises.length-1;
            }
            showQuestion();
        }

        
        function showNextQuestion() {
            num ++;
            if(num >= exercises.length) {
                num = 0;
            }
            showQuestion();
        }

        
        function RandomQuestion() {
            num = Math.floor(Math.random() * exercises.length);
            showQuestion();
        }

        
        function showAnswer() {
            document.querySelector(".AnswerBox").style.display = "block";
            document.querySelector("#ShowAnswer").style.backgroundColor = "#470808ff";
            document.querySelector("#HideAnswer").style.backgroundColor = "#4caf50";
        }

        
        function hideAnswer() {
            document.querySelector(".AnswerBox").style.display = "none";
            document.querySelector("#HideAnswer").style.backgroundColor = "#470808ff";
            document.querySelector("#ShowAnswer").style.backgroundColor = "#4caf50";
        }


        document.querySelector("#Change").addEventListener("click", RandomQuestion);
        document.querySelector("#Pre").addEventListener("click", showPreQuestion);
        document.querySelector("#Next").addEventListener("click", showNextQuestion);
        document.querySelector("#ShowAnswer").addEventListener("click", showAnswer);
        document.querySelector("#HideAnswer").addEventListener("click", hideAnswer);
        
        loadQuestion();

    </script>

<script>
    async function renderKaTeX() {
        
        let katex = document.querySelector(".math-katex");
        if (!katex) {
            return;
        }
        
        while (typeof renderMathInElement !== 'function') {
            await delay(500);
        }        
        
        renderMathInElement(document.body, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
            ],
            ignoredClasses: ["gist"]
        });
    }
    
    

    function delay(time) {
        return new Promise(resolve => {
            setTimeout(resolve, time)
        })
    }

    document.addEventListener('pjax:complete', () => {
        renderKaTeX();
    })
</script>

<script>
    function initTocHide() {
        
        let toc = document.querySelector(".widget--toc");
        if (!toc) {
            return;
        }
        
        window.addEventListener('scroll', function() {
            
            let openUl = document.querySelectorAll(".open");
            if (openUl.length > 0) {
                openUl.forEach((ul) => {
                ul.classList.remove("open")
              })
            }
            
            let currentLi = document.querySelector(".active-class");
            if (!currentLi) {
                return
            }
            
            if (currentLi.children.length > 1) {
                currentLi.children[1].classList.add("open")
            }
            
            let ul = currentLi.parentElement;
            do {
                ul.classList.add("open");
                ul = ul.parentElement.parentElement
            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
    }

    initTocHide(); 
</script>
